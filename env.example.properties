# ============================================
# ShengWang Configuration (Required)
# ============================================

# ShengWang App Credentials
# Get credentials from: https://console.shengwang.cn/
APP_ID=your_shengwang_app_id
APP_CERTIFICATE=your_shengwang_app_certificate


# ============================================
# Three-Tier AI Configuration
# ============================================

# LLM - Qwen via DashScope (Required)
# Get API key from: https://help.aliyun.com/zh/model-studio/get-api-key
LLM_API_KEY=sk-your_dashscope_api_key
# Optional override:
# LLM_URL=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# LLM_MODEL=qwen-plus

# ASR - Shengwang Fengming
# No extra credential fields are required when using vendor=fengming.

# TTS - Volcengine / ByteDance (Required)
# Get credentials from: https://www.volcengine.com/docs/6561/105873
TTS_BYTEDANCE_APP_ID=your_bytedance_app_id
TTS_BYTEDANCE_TOKEN=your_bytedance_access_token
